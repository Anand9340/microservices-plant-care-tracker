apiVersion: apps/v1
kind: Deployment
metadata:
  name: plant-care-app
  namespace: default
  labels:
    app: plant-care
spec:
  replicas: 3
  selector:
    matchLabels:
      app: plant-care
  template:
    metadata:
      labels:
        app: plant-care
    spec:
      containers:
      - name: plant-care
        image: anandsingh93/plant-care:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: plant-care-service
  namespace: default
  labels:
    app: plant-care
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: plant-care
