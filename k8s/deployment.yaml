apiVersion: apps/v1
kind: Deployment
metadata:
  name: plant-care-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: plant-care
  template:
    metadata:
      labels:
        app: plant-care
    spec:
      containers:
      - name: plant-care
        image: anandsingh93/plant-care:latest
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: plant-care-service
spec:
  selector:
    app: plant-care
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
