apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plant-care-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Anand9340/microservices-plant-care-tracker.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
